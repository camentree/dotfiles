format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$java\
$line_break\
$character"""

[directory]
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
format = " [$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

[character]
success_symbol = "[)](bold green)"
error_symbol = "[)](bold red)"

[python]
format = ' [${version}(\($virtualenv\))]($style)'
detect_files = [".python-version", "pyproject.toml"]

[nodejs]
format = ' [$version]($style)'

[java]
format = ' [$version]($style)'
